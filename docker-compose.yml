version: '3.8'
services:
  react_frontend:
    build: ./react_frontend
    ports:
      - '3000:3000'
    restart: unless-stopped
    depends_on:
      - nginx_proxy
  nginx_proxy:
    image: nginx:alpine
    ports:
      - '80:80'
    restart: unless-stopped
    depends_on:
      - node_backend
  node_backend:
    build: ./node_backend
    ports:
      - '5000:5000'
    restart: unless-stopped
    depends_on:
      - mongodb
  mongodb:
    image: mongo:6
    ports:
      - '27017:27017'
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
networks:
  app_network:
    driver: bridge
volumes:
  mongodb_data: null
